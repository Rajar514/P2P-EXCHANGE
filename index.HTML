<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO P2P | Chinese OTC Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --b-yellow: #fcd535; --b-black: #0b0e11; --b-gray: #1e2329; }
        body { background-color: var(--b-black); color: #eaecef; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .tab-active { color: var(--b-yellow); border-bottom: 3px solid var(--b-yellow); }
        .modal-overlay { background: rgba(0,0,0,0.92); display: none; position: fixed; inset: 0; z-index: 9999; align-items: center; justify-content: center; padding: 15px; }
        .show-modal { display: flex !important; }
        .custom-popup { animation: zoomIn 0.2s ease-out; border: 1px solid #333; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .status-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .network-selected { border-color: var(--b-yellow); background: rgba(252, 213, 53, 0.1); color: var(--b-yellow); }
    </style>
</head>
<body class="pb-10">

    <div id="notifSystem" class="fixed top-4 right-4 z-[10000] space-y-3 pointer-events-none"></div>

    <nav class="bg-[#12161c] border-b border-gray-800 sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <div class="bg-yellow-500 p-1.5 rounded-lg"><i class="fas fa-bolt-lightning text-black"></i></div>
                <h1 class="text-xl font-black italic tracking-tighter">PRO<span class="text-yellow-500">P2P</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right mr-2">
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Master Wallet</p>
                    <div class="flex flex-col items-end">
                        <span class="text-white font-mono font-bold text-lg leading-none">₹<span id="navInr">0.00</span></span>
                        <span class="text-yellow-500 font-mono text-xs font-bold"><span id="navUsdt">0.00</span> USDT</span>
                    </div>
                </div>
                <button onclick="openModal('depositModal')" class="bg-yellow-500 text-black px-6 py-2.5 rounded-xl font-bold hover:scale-105 transition-all">DEPOSIT</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 sm:p-6">
        
        <div class="flex gap-10 mb-8 border-b border-gray-800">
            <button onclick="switchView('market')" id="vMarket" class="pb-3 font-bold tab-active uppercase tracking-widest text-xs">Market</button>
            <button onclick="switchView('orders')" id="vOrders" class="pb-3 font-bold text-gray-500 relative uppercase tracking-widest text-xs">
                Active Deals <span id="orderCount" class="ml-1 bg-red-600 text-white text-[9px] px-1.5 py-0.5 rounded-full hidden">0</span>
            </button>
            <button onclick="switchView('history')" id="vHistory" class="pb-3 font-bold text-gray-500 uppercase tracking-widest text-xs">History</button>
        </div>

        <div id="marketView" class="view-section">
            <div id="adGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="ordersView" class="view-section hidden">
            <div id="activeOrdersList" class="space-y-4 min-h-[400px]"></div>
        </div>

        <div id="historyView" class="view-section hidden">
            <div class="bg-gray-800/20 rounded-3xl border border-gray-800 overflow-hidden text-xs">
                <table class="w-full text-left text-xs">
                    <thead class="bg-gray-800 text-gray-400 font-bold uppercase">
                        <tr><th class="p-5">Type</th><th class="p-5">Amount</th><th class="p-5">Status</th><th class="p-5 text-right">Date</th></tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="depositModal" class="modal-overlay">
        <div class="bg-[#1e2329] w-full max-w-md p-8 rounded-[2.5rem] border border-gray-700 custom-popup shadow-2xl">
            <div id="dep-1">
                <h3 class="text-2xl font-black italic mb-6">DEPOSIT USDT</h3>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="selectNet('BEP20')" id="netBEP20" class="p-4 rounded-2xl border border-gray-700 font-bold text-xs network-selected">BEP20</button>
                    <button onclick="selectNet('ERC20')" id="netERC20" class="p-4 rounded-2xl border border-gray-700 font-bold text-xs">ERC20</button>
                </div>
                <input type="number" id="depAmount" class="w-full bg-gray-900 border border-gray-700 p-5 rounded-2xl outline-none mb-6 text-2xl font-mono text-white" placeholder="0.00">
                <button onclick="generateDepQR()" class="w-full bg-yellow-500 text-black py-5 rounded-2xl font-black text-lg">GET ADDRESS</button>
            </div>
            <div id="dep-2" class="hidden text-center">
                <div class="bg-white p-3 rounded-2xl inline-block mb-6"><img id="qrImg" src="" class="w-40 h-40"></div>
                <p class="text-[10px] text-yellow-500 font-mono break-all bg-black/40 p-4 rounded-xl mb-6">0x6473d05d310C09199FacB9F738Cac86e04b68047</p>
                <button onclick="confirmDep()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black mb-4">I HAVE PAID</button>
                <button onclick="closeAllModals()" class="text-gray-500 text-xs font-bold uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <div id="sellModal" class="modal-overlay">
        <div class="bg-[#1e2329] w-full max-w-lg p-8 rounded-[2.5rem] border border-gray-700 custom-popup">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-2xl font-black italic">SELL ORDER</h3>
                <p class="text-right text-[10px] text-gray-500 uppercase font-bold">Rate<br><span class="text-white text-lg font-black">₹<span id="merchantRate">0.00</span></span></p>
            </div>
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between text-[10px] font-bold uppercase mb-2 text-gray-500"><span>Quantity</span><span onclick="setMaxSell()" class="text-yellow-500 cursor-pointer italic">Max</span></div>
                    <input type="number" id="sellInp" oninput="calcSell()" class="w-full bg-gray-900 p-5 rounded-2xl border border-gray-700 outline-none text-2xl font-mono text-white" placeholder="0.00">
                </div>
                <div class="bg-green-500/10 p-6 rounded-2xl border-l-4 border-green-500">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">You Receive</p>
                    <p class="text-4xl font-black text-white">₹<span id="payoutVal">0.00</span></p>
                </div>
                <input type="text" id="upiId" class="w-full bg-gray-900 p-5 rounded-2xl border border-gray-700 outline-none text-white" placeholder="Receiving UPI ID">
                <button onclick="createOrder()" class="w-full bg-red-600 py-5 rounded-2xl font-black text-xl shadow-xl shadow-red-600/20 active:scale-95 transition-all">CONFIRM ORDER</button>
            </div>
        </div>
    </div>

    <div id="dealPage" class="fixed inset-0 bg-[#0b0e11] z-[10000] hidden flex-col">
        <div class="p-5 bg-gray-900 border-b border-gray-800 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="exitDeal()" class="bg-gray-800 w-10 h-10 rounded-full flex items-center justify-center"><i class="fas fa-arrow-left text-gray-400"></i></button>
                <div><h4 class="font-black text-sm text-yellow-500 uppercase">OTC Terminal</h4><p id="dealIdDisp" class="text-[9px] text-gray-500 font-bold">Order #000000</p></div>
            </div>
            <button onclick="cancelTradeFromDeal()" class="text-red-500 text-[10px] font-black uppercase">Cancel Order</button>
        </div>
        <div class="flex-1 p-6 overflow-y-auto max-w-4xl mx-auto w-full">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-gray-800/40 p-6 rounded-2xl"><p class="text-gray-500 text-[9px] font-bold uppercase">Payout</p><p class="text-2xl font-black text-white" id="dInr">₹0.00</p></div>
                <div class="bg-gray-800/40 p-6 rounded-2xl"><p class="text-gray-500 text-[9px] font-bold uppercase">Locked</p><p class="text-2xl font-black text-yellow-500" id="dUsdt">0.00</p></div>
            </div>
            <div id="chatBox" class="bg-black/30 rounded-3xl p-6 h-[350px] overflow-y-auto border border-gray-800 space-y-4 mb-4"></div>
            <div class="flex gap-2">
                <input type="text" id="msgInp" class="flex-1 bg-gray-900 p-4 rounded-xl outline-none text-sm" placeholder="Send message...">
                <button onclick="sendMsg()" class="bg-yellow-500 text-black px-6 rounded-xl font-bold"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('pro_p2p_bal')) || 0;
        let activeOrders = JSON.parse(localStorage.getItem('pro_p2p_active')) || [];
        let history = JSON.parse(localStorage.getItem('pro_p2p_history')) || [];
        let currentTrade = null;
        let currentlyViewingOrder = null;
        const MY_ADDR = "0x6473d05d310C09199FacB9F738Cac86e04b68047";

        // --- NEW CHINESE OTC NAMES ---
        const CHINESE_NAMES = ["Zhang Wei", "Li Hua OTC", "Wang Fang Trade", "Chen Long Crypto", "Xing-Xing Assets", "Mei-Ling P2P", "Jun OTC Express", "Yao Trading", "Bao-Zhi OTC", "Lin Finance", "Sheng OTC"];

        function init() { updateBalance(); renderMarket(); renderActiveOrders(); renderHistory(); }

        function updateBalance() {
            document.getElementById('navUsdt').innerText = balance.toFixed(2);
            document.getElementById('navInr').innerText = (balance * 125).toLocaleString('en-IN');
            localStorage.setItem('pro_p2p_bal', balance);
        }

        function notify(type, title, msg) {
            const system = document.getElementById('notifSystem');
            const schemes = { success: 'border-green-500 bg-[#0d2e1f] text-green-400', error: 'border-red-500 bg-[#2e0d0d] text-red-400', pending: 'border-yellow-500 bg-[#2e260d] text-yellow-400' };
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-2xl border-l-4 ${schemes[type]} shadow-2xl custom-popup min-w-[280px] pointer-events-auto`;
            toast.innerHTML = `<h5 class="font-black text-[9px] uppercase mb-1">${title}</h5><p class="text-xs font-medium">${msg}</p>`;
            system.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function renderMarket() {
            const grid = document.getElementById('adGrid');
            grid.innerHTML = '';
            for(let i=0; i<12; i++) {
                const name = CHINESE_NAMES[Math.floor(Math.random() * CHINESE_NAMES.length)] + " " + (Math.floor(Math.random()*90)+10);
                const rate = (Math.random() * (140 - 120) + 120).toFixed(2);
                const qty = (Math.random() * (9000 - 20) + 20).toFixed(2);
                
                const card = document.createElement('div');
                card.className = "bg-[#1e2329]/50 p-6 rounded-[2rem] border border-gray-800 hover:border-yellow-500/30 transition-all";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <div><h4 class="text-sm font-black text-white uppercase italic">${name}</h4><p class="text-[8px] text-green-500 font-bold uppercase">High Speed Payout</p></div>
                        <div class="text-right"><p class="text-[8px] text-gray-500 uppercase">Rate</p><p class="text-xl font-black text-white italic">₹${rate}</p></div>
                    </div>
                    <div class="flex justify-between text-[10px] mb-6 font-bold text-gray-400"><span>Limit</span><span>$20 - $9000</span></div>
                    <button class="sell-btn w-full py-4 rounded-xl font-black bg-red-600 text-white shadow-lg shadow-red-600/10 active:scale-95 transition-all">SELL USDT</button>
                `;
                
                // --- FIXED BUTTON CLICK ---
                card.querySelector('.sell-btn').onclick = () => {
                    currentTrade = { name, rate };
                    document.getElementById('merchantRate').innerText = rate;
                    openModal('sellModal');
                };
                
                grid.appendChild(card);
            }
        }

        function setMaxSell() { document.getElementById('sellInp').value = balance; calcSell(); }
        function calcSell() { const val = document.getElementById('sellInp').value; document.getElementById('payoutVal').innerText = (val * currentTrade.rate).toLocaleString('en-IN'); }

        function createOrder() {
            const amt = parseFloat(document.getElementById('sellInp').value);
            const upi = document.getElementById('upiId').value;
            if(!amt || amt > balance || amt <= 0) return notify('error', 'Alert', 'Invalid balance.');
            if(!upi) return notify('error', 'Required', 'Enter UPI ID to receive payment.');

            balance -= amt; updateBalance();
            const order = { id: Math.floor(100000 + Math.random() * 900000), usdt: amt, rate: currentTrade.rate, inr: (amt * currentTrade.rate).toFixed(2), merchant: currentTrade.name, status: 'ONGOING' };
            activeOrders.unshift(order);
            saveState();
            closeAllModals();
            launchDeal(order.id);
        }

        function launchDeal(id) {
            const o = activeOrders.find(x => x.id == id);
            currentlyViewingOrder = id;
            document.getElementById('dealIdDisp').innerText = "Order #" + o.id;
            document.getElementById('dInr').innerText = "₹" + parseFloat(o.inr).toLocaleString('en-IN');
            document.getElementById('dUsdt').innerText = o.usdt + " USDT";
            document.getElementById('dealPage').classList.remove('hidden');
            document.getElementById('chatBox').innerHTML = `<div class="bg-gray-800 p-4 rounded-2xl text-[10px] border border-gray-700 italic">SYSTEM: USDT Locked in Escrow. Contacting ${o.merchant}...</div>`;
            setTimeout(() => appendChat(o.merchant, `Hello, I'm online. Please send your UPI QR or confirm the ID for ₹${parseFloat(o.inr).toLocaleString('en-IN')}.`), 2000);
        }

        function cancelTradeFromDeal() {
            if(confirm("Cancel trade? Assets will be returned to your wallet.")) {
                const index = activeOrders.findIndex(x => x.id == currentlyViewingOrder);
                const o = activeOrders[index];
                balance += o.usdt; updateBalance();
                addHistory('CANCELLED', o.usdt, 'REFUNDED');
                activeOrders.splice(index, 1);
                saveState(); exitDeal();
                notify('pending', 'Cancelled', 'Trade terminated and assets refunded.');
            }
        }

        function renderActiveOrders() {
            const list = document.getElementById('activeOrdersList');
            const count = document.getElementById('orderCount');
            list.innerHTML = '';
            if(!activeOrders.length) { list.innerHTML = '<div class="text-center py-20 text-gray-700 font-black italic uppercase">No Active Deals</div>'; count.classList.add('hidden'); return; }
            count.innerText = activeOrders.length; count.classList.remove('hidden');
            activeOrders.forEach(o => {
                list.innerHTML += `
                    <div class="bg-gray-800/40 p-6 rounded-[2rem] border border-gray-800 flex justify-between items-center shadow-xl">
                        <div onclick="launchDeal(${o.id})" class="cursor-pointer flex-1">
                            <h4 class="font-black text-lg italic text-white">${o.usdt} USDT</h4>
                            <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">${o.merchant} • ID #${o.id}</p>
                        </div>
                        <div class="text-right"><p class="font-black text-white italic">₹${parseFloat(o.inr).toLocaleString('en-IN')}</p><p class="text-[8px] text-green-500 font-black status-pulse uppercase">Ongoing</p></div>
                    </div>`;
            });
        }

        function renderHistory() {
            const body = document.getElementById('historyBody');
            body.innerHTML = history.length ? '' : '<tr><td colspan="4" class="p-10 text-center text-gray-700 italic">Empty History</td></tr>';
            history.forEach(h => {
                body.innerHTML += `<tr class="border-b border-gray-800">
                    <td class="p-5 font-black uppercase italic ${h.type.includes('CANCEL') ? 'text-red-500' : 'text-green-500'}">${h.type}</td>
                    <td class="p-5 font-mono font-bold">${h.amt} USDT</td>
                    <td class="p-5"><span class="px-2 py-1 rounded-lg text-[8px] font-black tracking-widest bg-gray-800">${h.status}</span></td>
                    <td class="p-5 text-right text-gray-600">${new Date().toLocaleDateString()}</td>
                </tr>`;
            });
        }

        function generateDepQR() {
            const amt = document.getElementById('depAmount').value;
            if(!amt || amt <= 0) return notify('error', 'Error', 'Enter amount.');
            document.getElementById('dep-1').classList.add('hidden');
            document.getElementById('dep-2').classList.remove('hidden');
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${MY_ADDR}`;
        }

        function confirmDep() {
            const amt = parseFloat(document.getElementById('depAmount').value);
            if(amt == 101) { balance += 101; updateBalance(); addHistory('DEPOSIT', 101, 'COMPLETED'); notify('success', 'Asset Added', '101 USDT received.'); closeAllModals(); }
            else { addHistory('DEPOSIT', amt, 'PENDING'); notify('pending', 'Verifying', 'Waiting for blockchain confirmations...'); closeAllModals(); }
        }

        function addHistory(type, amt, status) { history.unshift({ type, amt, status }); localStorage.setItem('pro_p2p_history', JSON.stringify(history)); renderHistory(); }
        function saveState() { localStorage.setItem('pro_p2p_active', JSON.stringify(activeOrders)); renderActiveOrders(); }
        function openModal(id) { document.getElementById(id).classList.add('show-modal'); }
        function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show-modal')); document.getElementById('dep-1').classList.remove('hidden'); document.getElementById('dep-2').classList.add('hidden'); }
        function selectNet(net) { document.querySelectorAll('[id^="net"]').forEach(b => b.classList.remove('network-selected')); document.getElementById('net'+net).classList.add('network-selected'); }
        function switchView(view) { document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden')); document.getElementById(view + 'View').classList.remove('hidden'); document.querySelectorAll('[id^="v"]').forEach(t => t.className = 'pb-3 font-bold text-gray-500 uppercase text-xs'); document.getElementById('v' + view.charAt(0).toUpperCase() + view.slice(1)).className = 'pb-3 font-bold tab-active uppercase text-xs'; }
        function exitDeal() { document.getElementById('dealPage').classList.add('hidden'); switchView('orders'); }
        function sendMsg() { const inp = document.getElementById('msgInp'); if(!inp.value) return; appendChat('You', inp.value, true); inp.value = ''; }
        function appendChat(sender, msg, isMe = false) { const box = document.getElementById('chatBox'); const div = document.createElement('div'); div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`; div.innerHTML = `<div class="${isMe ? 'bg-yellow-500 text-black' : 'bg-gray-800 text-white border border-gray-700'} p-3 rounded-2xl text-[11px] font-bold max-w-[80%] shadow-lg"><p class="text-[8px] opacity-50 mb-1 uppercase">${sender}</p><p>${msg}</p></div>`; box.appendChild(div); box.scrollTop = box.scrollHeight; }

        window.onload = init;
    </script>
</body>
</html>
