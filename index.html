<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro P2P Exchange | Advanced Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        .typing-dot { animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <div class="text-2xl font-black text-yellow-500 italic uppercase">PRO<span class="text-black">P2P</span></div>
        <div class="flex items-center space-x-6">
            <div class="text-right">
                <p class="text-[9px] text-gray-400 font-black uppercase">Balance</p>
                <p class="text-sm font-black text-green-600"><span id="user-balance">0.00</span> USDT</p>
            </div>
            <button onclick="showPage('deposit-select')" class="bg-yellow-500 text-white px-5 py-2 rounded-xl font-black text-xs shadow-md">ADD FUNDS</button>
        </div>
    </nav>

    <div id="p2p-page" class="max-w-6xl mx-auto p-4 md:py-8">
        <div id="ongoing-section" class="hidden mb-10">
            <h2 class="text-red-500 font-black text-sm mb-3 uppercase tracking-widest flex items-center">
                <span class="relative flex h-3 w-3 mr-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>
                Ongoing Trade
            </h2>
            <div class="bg-white border-2 border-red-100 rounded-2xl p-5 flex justify-between items-center shadow-lg">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase">Order #9283741 • Li Wei</p>
                    <p class="text-lg font-black text-gray-800">Selling <span id="ongoing-amount">0</span> USDT</p>
                </div>
                <div class="flex space-x-3">
                    <button onclick="showPage('order')" class="bg-gray-800 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase">Open Chat</button>
                    <button onclick="cancelOrder()" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-black text-[10px] uppercase border border-red-100">Cancel</button>
                </div>
            </div>
        </div>

        <h1 class="text-2xl font-black mb-6 italic underline decoration-yellow-400 uppercase">Marketplace</h1>
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <table class="w-full text-left divide-y divide-gray-100 text-sm">
                <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase font-black tracking-widest"><tr id="ad-header"></tr></thead>
                <tbody id="ad-list"></tbody>
            </table>
        </div>
    </div>

    <div id="deposit-select-page" class="hidden fixed inset-0 bg-white z-[100] p-6 overflow-y-auto">
        <button onclick="showPage('p2p')" class="absolute top-6 right-6 text-3xl">&times;</button>
        <div class="max-w-2xl mx-auto mt-10">
            <h2 class="text-2xl font-black mb-8 uppercase italic">1. Select Currency</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10" id="coin-list"></div>
            <label class="text-[10px] font-black uppercase text-gray-400">Amount to Deposit ($)</label>
            <input id="dep-amt" type="number" class="w-full border-2 p-4 rounded-2xl font-black text-xl mb-6 outline-none focus:border-yellow-400" placeholder="Min 10.00">
            <button onclick="goToDepositDetails()" class="w-full bg-black text-white py-4 rounded-2xl font-black uppercase tracking-widest">Next Step</button>
        </div>
    </div>

    <div id="deposit-details-page" class="hidden fixed inset-0 bg-white z-[110] p-6">
        <button onclick="showPage('deposit-select')" class="absolute top-6 right-6 text-3xl font-light hover:text-red-500 transition">&times;</button>
        <div class="max-w-xl mx-auto text-center mt-10">
            <h2 class="text-2xl font-black mb-2 uppercase">2. Send USDT (BEP20)</h2>
            <p class="text-red-500 font-bold text-lg mb-6" id="dep-timer">05:00</p>
            <div class="bg-white p-4 border-8 border-yellow-400 rounded-3xl shadow-2xl inline-block mb-8">
                <canvas id="qr-code"></canvas>
            </div>
            <div class="bg-gray-100 p-4 rounded-xl border font-mono text-xs break-all mb-8 font-bold flex justify-between items-center">
                <span id="target-addr">0x6473d05d310C09199FacB9F738Cac86e04b68047</span>
                <i onclick="copyAddress()" class="fa-solid fa-copy text-yellow-600 cursor-pointer ml-3"></i>
            </div>
            <button onclick="simulateDeposit()" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">I have transferred funds</button>
        </div>
    </div>

    <div id="sell-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-[150]">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full relative">
            <button onclick="closeModal('sell-modal')" class="absolute top-4 right-4 text-2xl">&times;</button>
            <h3 class="text-xl font-black mb-6 uppercase">Sell USDT</h3>
            <input id="sell-amt" type="number" class="w-full border-2 p-4 rounded-2xl mb-6 font-black text-2xl outline-none" placeholder="0.00">
            <button onclick="startOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest">Confirm Trade</button>
        </div>
    </div>

    <div id="order-page" class="hidden fixed inset-0 bg-gray-50 z-[120] overflow-y-auto">
        <div class="max-w-6xl mx-auto p-4 md:p-10 relative">
            <button onclick="showPage('p2p')" class="absolute top-6 right-6 text-3xl">&times;</button>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-10">
                <div class="lg:col-span-1 bg-white rounded-3xl p-8 shadow-xl">
                    <div class="text-center mb-10">
                        <p id="order-timer-display" class="text-red-600 font-black text-2xl mb-2">30:00</p>
                        <p class="text-gray-400 text-xs font-black uppercase">Receiving INR</p>
                        <h2 class="text-4xl font-black text-gray-900" id="inr-display">₹0.00</h2>
                    </div>
                    <button onclick="cancelOrder()" class="w-full border-2 border-red-100 text-red-500 py-3 rounded-xl font-black text-xs uppercase">Cancel Order</button>
                </div>
                <div class="lg:col-span-2 bg-white rounded-3xl shadow-xl flex flex-col h-[500px]">
                    <div class="p-4 bg-gray-50 border-b font-black text-xs uppercase tracking-widest">Chat with Li Wei</div>
                    <div class="flex-1 p-6 space-y-4 overflow-y-auto" id="chat-messages">
                        <div id="typing-ui" class="flex items-start">
                            <div class="bg-gray-100 px-4 py-3 rounded-2xl flex space-x-1">
                                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 border-t flex space-x-3">
                        <input type="text" placeholder="Type message..." class="flex-1 bg-gray-50 rounded-xl px-4 py-3 outline-none focus:ring-2 ring-yellow-400 text-sm">
                        <button class="bg-yellow-500 text-white px-6 rounded-xl shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let balance = 0.00;
        let ongoingAmt = 0;
        const WALLET = "0x6473d05d310C09199FacB9F738Cac86e04b68047";

        function showPage(page) {
            ['p2p-page', 'deposit-select-page', 'deposit-details-page', 'order-page'].forEach(p => {
                let el = document.getElementById(p + (p.includes('page') ? '' : ''));
                if(el) el.classList.add('hidden');
            });
            document.getElementById(page + '-page').classList.remove('hidden');
            if(page === 'order') triggerChat();
        }

        function goToDepositDetails() {
            if(!document.getElementById('dep-amt').value) return alert("Enter Amount");
            showPage('deposit-details');
            startTimer(300, 'dep-timer');
        }

        function simulateDeposit() {
            balance += 101.00;
            document.getElementById('user-balance').textContent = balance.toFixed(2);
            alert("$101.00 USDT Credited!");
            showPage('p2p');
        }

        function startOrder() {
            let val = parseFloat(document.getElementById('sell-amt').value);
            if(!val || val > balance) return alert("Insufficient Balance");
            
            balance -= val;
            ongoingAmt = val;
            document.getElementById('user-balance').textContent = balance.toFixed(2);
            document.getElementById('ongoing-amount').textContent = val;
            document.getElementById('inr-display').textContent = "₹" + (val * 91.25).toLocaleString();
            
            document.getElementById('ongoing-section').classList.remove('hidden');
            closeModal('sell-modal');
            showPage('order');
            startTimer(1800, 'order-timer-display');
        }

        function cancelOrder() {
            if(!confirm("Cancel this trade? USDT will be refunded.")) return;
            balance += ongoingAmt;
            ongoingAmt = 0;
            document.getElementById('user-balance').textContent = balance.toFixed(2);
            document.getElementById('ongoing-section').classList.add('hidden');
            showPage('p2p');
        }

        function triggerChat() {
            const chatBox = document.getElementById('chat-messages');
            const typing = document.getElementById('typing-ui');
            typing.classList.remove('hidden');
            
            setTimeout(() => {
                typing.classList.add('hidden');
                chatBox.innerHTML += `
                    <div class="max-w-[80%] bg-gray-100 p-4 rounded-2xl rounded-tl-none animate-in fade-in duration-500">
                        <p class="text-xs text-gray-400 mb-1 font-bold italic">你好，我在线。请发送您的 UPI 以进行付款。</p>
                        <p class="text-[13px] font-black">Hello, I am online. Please send your UPI for payment.</p>
                    </div>`;
            }, 3000);
        }

        function startTimer(t, id) {
            let timer = t;
            let interval = setInterval(() => {
                let m = Math.floor(timer / 60), s = timer % 60;
                document.getElementById(id).textContent = `${m}:${s < 10 ? '0'+s : s}`;
                if (--timer < 0) clearInterval(interval);
            }, 1000);
        }

        function copyAddress() { navigator.clipboard.writeText(WALLET); alert("Copied!"); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openSell() { 
            if(balance <= 0) return showPage('deposit-select');
            document.getElementById('sell-modal').classList.remove('hidden'); 
        }

        // Init Coins & Ads
        const coins = ["USDT", "BTC", "ETH", "SOL", "BNB", "TRX", "DOGE", "XRP", "LTC", "MATIC"];
        const names = ["Li Wei", "Zhang Min", "Chen Yu", "Wang Fang", "Liu Yang", "Zhu Fen", "Sun Tao", "Huang Bo", "Zhao Lei", "Wu Fan", "Xu Dong", "Ma Jun", "Zhou Peng", "He Wei", "Ma Lin", "He Peng", "Sun Xiao", "Li Na", "Zhang Jilong", "Wang Rao"];
        
        coins.forEach(c => {
            document.getElementById('coin-list').innerHTML += `<div onclick="this.style.borderColor='#EAB308'" class="border-2 p-4 rounded-xl text-center cursor-pointer font-black text-xs uppercase hover:bg-yellow-50 transition">${c}</div>`;
        });

        names.forEach(name => {
            let price = (91.10 + Math.random() * 0.7).toFixed(2);
            document.getElementById('ad-list').innerHTML += `
                <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                    <td class="p-5 font-black text-blue-600">${name} <i class="fa-solid fa-circle-check text-yellow-500 text-[10px]"></i></td>
                    <td class="p-5 font-black text-lg">₹${price}</td>
                    <td class="p-5 text-[10px] font-bold text-gray-400">Limit ₹2,000 - ₹50,000</td>
                    <td class="p-5 text-right"><button onclick="openSell()" class="bg-green-600 text-white px-6 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg">Sell</button></td>
                </tr>`;
        });

        new QRious({ element: document.getElementById('qr-code'), value: WALLET, size: 180, foreground: '#000' });
    </script>
</body>
</html>
